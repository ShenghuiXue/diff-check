<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standalone browser-based text diff viewer with side-by-side and unified comparison modes.">
  <title>Text Diff Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: rgba(255, 255, 255, 0.94);
      --border: #d7dde6;
      --border-strong: #c6cfdb;
      --text: #17212f;
      --muted: #5f6b7c;
      --accent: #1f5fbf;
      --accent-soft: #eaf1fb;
      --add: #edf7f1;
      --add-border: #83b996;
      --remove: #fbefef;
      --remove-border: #d09090;
      --same: #f8fafc;
      --shadow: 0 18px 50px rgba(23, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      width: min(1960px, calc(100vw - 12px));
      min-height: calc(100vh - 12px);
      margin: 6px auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: clamp(18px, 2vw, 26px);
      background: linear-gradient(180deg, #ffffff, #f7f9fc);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 2.9vw, 3rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 72ch;
    }

    .editors {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 14px 14px;
    }

    .editor-panel {
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fbfcfe);
      border-radius: 14px;
      border: 1px solid #e5e9f0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .panel-title {
      display: block;
    }

    .meta {
      color: var(--muted);
      font-size: 0.88rem;
    }

    textarea {
      width: 100%;
      min-height: clamp(220px, 30vh, 460px);
      height: clamp(280px, 34vh, 520px);
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 16px;
      font: 14px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      color: var(--text);
      background: #ffffff;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(31, 95, 191, 0.12);
    }

    .results {
      padding: 16px;
      display: grid;
      min-height: 0;
    }

    .results-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .results-top h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
      align-items: center;
    }

    .pill {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f7f9fc;
    }

    .view-toggle legend {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .view-option {
      position: relative;
    }

    .view-option input {
      position: absolute;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .view-option label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 8px 14px;
      border-radius: 9px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }

    .view-option input:focus-visible + label {
      outline: 2px solid rgba(31, 95, 191, 0.22);
      outline-offset: 1px;
    }

    .view-option input:checked + label {
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(23, 33, 47, 0.08);
    }

    .diff-output {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      max-height: clamp(320px, 54vh, 1200px);
      overflow: auto;
      min-height: 0;
    }

    .diff-header,
    .diff-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .diff-output.single-column .diff-header,
    .diff-output.single-column .diff-row {
      grid-template-columns: minmax(0, 1fr);
    }

    .diff-header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      border-bottom: 1px solid #e7ebf2;
      font-weight: 600;
      color: var(--muted);
    }

    .diff-header > div {
      padding: 12px 16px;
    }

    .diff-header > div:first-child {
      border-right: 1px solid #e7ebf2;
    }

    .empty-state {
      padding: 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .diff-row {
      border-top: 1px solid #edf1f7;
    }

    .diff-row:first-of-type {
      border-top: none;
    }

    .diff-cell {
      display: grid;
      grid-template-columns: 60px 34px minmax(0, 1fr);
      font: 13px/1.55 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      min-height: 44px;
    }

    .diff-cell.left {
      border-right: 1px solid #edf1f7;
    }

    .cell-line,
    .cell-marker,
    .cell-content {
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cell-line {
      text-align: right;
      color: var(--muted);
      background: #fafbfd;
      border-right: 1px solid #edf1f7;
    }

    .cell-marker {
      text-align: center;
      font-weight: 700;
      border-right: 1px solid #edf1f7;
    }

    .cell-content {
      padding-left: 14px;
    }

    .empty-cell .cell-content {
      color: #99a4b7;
      background: #fcfdff;
    }

    .same .cell-content {
      background: var(--same);
    }

    .add .cell-content,
    .add .cell-marker {
      background: var(--add);
    }

    .remove .cell-content,
    .remove .cell-marker {
      background: var(--remove);
    }

    .change-left .cell-content,
    .change-left .cell-marker {
      background: #fcf1f1;
      border-left: 3px solid var(--remove-border);
    }

    .change-right .cell-content,
    .change-right .cell-marker {
      background: #eff8f2;
      border-left: 3px solid var(--add-border);
    }

    .token-remove {
      background: rgba(208, 144, 144, 0.26);
      border-radius: 3px;
    }

    .token-add {
      background: rgba(131, 185, 150, 0.28);
      border-radius: 3px;
    }

    .unified-entry {
      border-top: 1px solid #edf1f7;
      padding: 0;
    }

    .unified-entry:first-of-type {
      border-top: none;
    }

    .unified-block {
      display: grid;
      grid-template-columns: 72px 42px minmax(0, 1fr);
      font: 13px/1.55 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .unified-block + .unified-block {
      border-top: 1px solid #eef2f6;
    }

    .unified-line,
    .unified-marker,
    .unified-content {
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .unified-line {
      text-align: right;
      color: var(--muted);
      background: #fafbfd;
      border-right: 1px solid #edf1f7;
    }

    .unified-marker {
      text-align: center;
      font-weight: 700;
      border-right: 1px solid #edf1f7;
    }

    .unified-content.same {
      background: var(--same);
    }

    .unified-content.remove {
      background: var(--remove);
      border-left: 3px solid var(--remove-border);
    }

    .unified-content.add {
      background: var(--add);
      border-left: 3px solid var(--add-border);
    }

    @media (max-width: 900px) {
      .page {
        width: min(100vw, calc(100vw - 8px));
        margin: 4px auto;
        gap: 8px;
      }

      .editors {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 10px 10px;
      }

      .diff-header,
      .diff-row {
        grid-template-columns: 1fr;
      }

      .diff-output.single-column .diff-header {
        grid-template-columns: 1fr;
      }

      .diff-header > div:first-child,
      .diff-cell.left {
        border-right: none;
        border-bottom: 1px solid #edf1f7;
      }

      .diff-cell {
        grid-template-columns: 54px 32px minmax(0, 1fr);
      }

      .results,
      .editor-panel {
        padding: 12px;
      }

      .view-option label {
        min-width: 96px;
      }

      .toolbar {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (min-width: 1500px) {
      .editors {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      textarea {
        height: clamp(320px, 36vh, 620px);
      }

      .diff-output {
        max-height: clamp(420px, 58vh, 1400px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card hero">
      <h1>Text Diff Viewer</h1>
      <p class="subtitle">
        Paste or type two blocks of text below. When both sides have content, the page shows a line-by-line diff at the bottom.
      </p>
    </section>

    <section class="card editors">
      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>Left Text</h2>
          </div>
          <span class="meta" id="leftMeta">0 lines</span>
        </div>
        <textarea id="leftText" placeholder="Paste the original text here..." aria-label="Left text input"></textarea>
      </div>

      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>Right Text</h2>
          </div>
          <span class="meta" id="rightMeta">0 lines</span>
        </div>
        <textarea id="rightText" placeholder="Paste the updated text here..." aria-label="Right text input"></textarea>
      </div>
    </section>

    <section class="card results">
      <div class="results-top">
        <h2>Differences</h2>
        <div class="toolbar">
          <fieldset class="view-toggle">
            <legend>Compare View</legend>
            <div class="view-option">
              <input type="radio" id="viewTwoColumn" name="viewMode" value="two-column" checked>
              <label for="viewTwoColumn">Two Columns</label>
            </div>
            <div class="view-option">
              <input type="radio" id="viewSingleColumn" name="viewMode" value="single-column">
              <label for="viewSingleColumn">Single Column</label>
            </div>
          </fieldset>
          <div class="stats">
            <span class="pill" id="sameCount">Unchanged: 0</span>
            <span class="pill" id="changeCount">Changed: 0</span>
            <span class="pill" id="addCount">Added: 0</span>
            <span class="pill" id="removeCount">Removed: 0</span>
          </div>
        </div>
      </div>
      <div class="diff-output" id="diffOutput">
        <div class="empty-state">
          Fill both text fields to see the diff.
        </div>
      </div>
    </section>
  </main>

  <script>
    const leftText = document.getElementById("leftText");
    const rightText = document.getElementById("rightText");
    const leftMeta = document.getElementById("leftMeta");
    const rightMeta = document.getElementById("rightMeta");
    const diffOutput = document.getElementById("diffOutput");
    const sameCount = document.getElementById("sameCount");
    const changeCount = document.getElementById("changeCount");
    const addCount = document.getElementById("addCount");
    const removeCount = document.getElementById("removeCount");
    const viewModeInputs = document.querySelectorAll('input[name="viewMode"]');

    function splitLines(text) {
      return text.replace(/\r\n/g, "\n").split("\n");
    }

    function updateMeta() {
      leftMeta.textContent = `${splitLines(leftText.value).length} lines`;
      rightMeta.textContent = `${splitLines(rightText.value).length} lines`;
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function tokenize(value) {
      return value.match(/(\s+|[A-Za-z0-9_]+|[^A-Za-z0-9_\s])/g) || [];
    }

    function buildDiff(a, b) {
      const n = a.length;
      const m = b.length;
      const max = n + m;
      const offset = max;
      const v = new Array((max * 2) + 1).fill(0);
      const trace = [];

      for (let d = 0; d <= max; d += 1) {
        trace.push(v.slice());

        for (let k = -d; k <= d; k += 2) {
          const index = k + offset;
          let x;

          if (k === -d || (k !== d && v[index - 1] < v[index + 1])) {
            x = v[index + 1];
          } else {
            x = v[index - 1] + 1;
          }

          let y = x - k;

          while (x < n && y < m && a[x] === b[y]) {
            x += 1;
            y += 1;
          }

          v[index] = x;

          if (x >= n && y >= m) {
            trace.push(v.slice());
            return backtrack(trace, a, b, offset);
          }
        }
      }

      return [];
    }

    function backtrack(trace, a, b, offset) {
      const result = [];
      let x = a.length;
      let y = b.length;

      for (let d = trace.length - 1; d > 0; d -= 1) {
        const v = trace[d - 1];
        const k = x - y;
        const prevK = (k === -(d - 1) || (k !== (d - 1) && v[k - 1 + offset] < v[k + 1 + offset]))
          ? k + 1
          : k - 1;

        const prevX = v[prevK + offset];
        const prevY = prevX - prevK;

        while (x > prevX && y > prevY) {
          result.push({ type: "same", text: a[x - 1] });
          x -= 1;
          y -= 1;
        }

        if (d === 1) {
          break;
        }

        if (x === prevX) {
          result.push({ type: "add", text: b[y - 1] });
          y -= 1;
        } else {
          result.push({ type: "remove", text: a[x - 1] });
          x -= 1;
        }
      }

      while (x > 0 && y > 0) {
        result.push({ type: "same", text: a[x - 1] });
        x -= 1;
        y -= 1;
      }

      while (x > 0) {
        result.push({ type: "remove", text: a[x - 1] });
        x -= 1;
      }

      while (y > 0) {
        result.push({ type: "add", text: b[y - 1] });
        y -= 1;
      }

      return result.reverse();
    }

    function buildPairedRows(diff) {
      const rows = [];
      let leftLine = 1;
      let rightLine = 1;

      for (let i = 0; i < diff.length; i += 1) {
        const entry = diff[i];

        if (entry.type === "same") {
          rows.push({
            kind: "same",
            left: { line: leftLine, text: entry.text, marker: " " },
            right: { line: rightLine, text: entry.text, marker: " " }
          });
          leftLine += 1;
          rightLine += 1;
          continue;
        }

        if (entry.type === "remove" || entry.type === "add") {
          const removed = [];
          const added = [];

          while (i < diff.length && diff[i].type !== "same") {
            if (diff[i].type === "remove") {
              removed.push(diff[i].text);
            } else {
              added.push(diff[i].text);
            }
            i += 1;
          }

          i -= 1;
          const blockSize = Math.max(removed.length, added.length);

          for (let index = 0; index < blockSize; index += 1) {
            const leftValue = removed[index];
            const rightValue = added[index];

            if (leftValue !== undefined && rightValue !== undefined) {
              rows.push({
                kind: "change",
                left: { line: leftLine, text: leftValue, marker: "~" },
                right: { line: rightLine, text: rightValue, marker: "~" }
              });
              leftLine += 1;
              rightLine += 1;
            } else if (leftValue !== undefined) {
              rows.push({
                kind: "remove",
                left: { line: leftLine, text: leftValue, marker: "-" },
                right: { line: "", text: "", marker: " " }
              });
              leftLine += 1;
            } else {
              rows.push({
                kind: "add",
                left: { line: "", text: "", marker: " " },
                right: { line: rightLine, text: rightValue, marker: "+" }
              });
              rightLine += 1;
            }
          }
        }
      }

      return rows;
    }

    function buildInlineDiff(leftTextValue, rightTextValue) {
      const tokenDiff = buildDiff(tokenize(leftTextValue), tokenize(rightTextValue));
      let leftMarkup = "";
      let rightMarkup = "";

      for (const entry of tokenDiff) {
        const escaped = escapeHtml(entry.text) || "&nbsp;";

        if (entry.type === "same") {
          leftMarkup += escaped;
          rightMarkup += escaped;
        } else if (entry.type === "remove") {
          leftMarkup += `<span class="token-remove">${escaped}</span>`;
        } else if (entry.type === "add") {
          rightMarkup += `<span class="token-add">${escaped}</span>`;
        }
      }

      return {
        left: leftMarkup || "&nbsp;",
        right: rightMarkup || "&nbsp;"
      };
    }

    function buildCell(side, variant, inlineMarkup) {
      const text = side.text;
      const safeText = text ? escapeHtml(text) : "&nbsp;";
      let content = safeText;

      if (inlineMarkup) {
        content = inlineMarkup;
      }

      return `
        <div class="diff-cell ${variant} ${text ? "" : "empty-cell"}">
          <span class="cell-line">${side.line}</span>
          <span class="cell-marker">${side.marker}</span>
          <span class="cell-content">${content || "&nbsp;"}</span>
        </div>
      `;
    }

    function getViewMode() {
      const selected = Array.from(viewModeInputs).find((input) => input.checked);
      return selected ? selected.value : "two-column";
    }

    function buildUnifiedBlock(lineNumber, marker, content, variant) {
      return `
        <div class="unified-block">
          <span class="unified-line">${lineNumber}</span>
          <span class="unified-marker">${marker}</span>
          <span class="unified-content ${variant}">${content}</span>
        </div>
      `;
    }

    function renderTwoColumn(rows) {
      return rows.map((row) => {
        if (row.kind === "same") {
          return `
            <div class="diff-row">
              ${buildCell(row.left, "same")}
              ${buildCell(row.right, "same")}
            </div>
          `;
        }

        if (row.kind === "change") {
          const inlineDiff = buildInlineDiff(row.left.text, row.right.text);
          return `
            <div class="diff-row">
              ${buildCell(row.left, "change-left", inlineDiff.left)}
              ${buildCell(row.right, "change-right", inlineDiff.right)}
            </div>
          `;
        }

        if (row.kind === "remove") {
          return `
            <div class="diff-row">
              ${buildCell(row.left, "remove")}
              ${buildCell(row.right, "same")}
            </div>
          `;
        }

        return `
          <div class="diff-row">
            ${buildCell(row.left, "same")}
            ${buildCell(row.right, "add")}
          </div>
        `;
      }).join("");
    }

    function renderSingleColumn(rows) {
      return rows.map((row) => {
        if (row.kind === "same") {
          return `
            <div class="unified-entry">
              ${buildUnifiedBlock(`${row.left.line}/${row.right.line}`, " ", escapeHtml(row.left.text) || "&nbsp;", "same")}
            </div>
          `;
        }

        if (row.kind === "change") {
          const inlineDiff = buildInlineDiff(row.left.text, row.right.text);
          return `
            <div class="unified-entry">
              ${buildUnifiedBlock(row.left.line, "-", inlineDiff.left, "remove")}
              ${buildUnifiedBlock(row.right.line, "+", inlineDiff.right, "add")}
            </div>
          `;
        }

        if (row.kind === "remove") {
          return `
            <div class="unified-entry">
              ${buildUnifiedBlock(row.left.line, "-", escapeHtml(row.left.text) || "&nbsp;", "remove")}
            </div>
          `;
        }

        return `
          <div class="unified-entry">
            ${buildUnifiedBlock(row.right.line, "+", escapeHtml(row.right.text) || "&nbsp;", "add")}
          </div>
        `;
      }).join("");
    }

    function renderDiff() {
      updateMeta();

      const leftValue = leftText.value;
      const rightValue = rightText.value;

      if (!leftValue.trim() || !rightValue.trim()) {
        diffOutput.innerHTML = '<div class="empty-state">Fill both text fields to see the diff.</div>';
        sameCount.textContent = "Unchanged: 0";
        changeCount.textContent = "Changed: 0";
        addCount.textContent = "Added: 0";
        removeCount.textContent = "Removed: 0";
        return;
      }

      const leftLines = splitLines(leftValue);
      const rightLines = splitLines(rightValue);
      const diff = buildDiff(leftLines, rightLines);

      const rows = buildPairedRows(diff);
      let same = 0;
      let changed = 0;
      let added = 0;
      let removed = 0;

      rows.forEach((row) => {
        if (row.kind === "same") {
          same += 1;
        } else if (row.kind === "change") {
          changed += 1;
        } else if (row.kind === "remove") {
          removed += 1;
        } else {
          added += 1;
        }
      });

      const viewMode = getViewMode();
      const markup = viewMode === "single-column"
        ? renderSingleColumn(rows)
        : renderTwoColumn(rows);

      diffOutput.className = `diff-output ${viewMode}`;
      diffOutput.innerHTML = viewMode === "single-column"
        ? `
          <div class="diff-header">
            <div>Unified Diff</div>
          </div>
          ${markup}
        `
        : `
          <div class="diff-header">
            <div>Left / Original</div>
            <div>Right / Updated</div>
          </div>
          ${markup}
        `;
      sameCount.textContent = `Unchanged: ${same}`;
      changeCount.textContent = `Changed: ${changed}`;
      addCount.textContent = `Added: ${added}`;
      removeCount.textContent = `Removed: ${removed}`;
    }

    leftText.addEventListener("input", renderDiff);
    rightText.addEventListener("input", renderDiff);
    viewModeInputs.forEach((input) => input.addEventListener("change", renderDiff));

    renderDiff();
  </script>
</body>
</html>
