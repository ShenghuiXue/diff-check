<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Standalone browser-based text diff viewer with side-by-side and unified comparison modes.">
  <title>Text Diff Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --panel: rgba(255, 255, 255, 0.94);
      --border: #d7dde6;
      --border-strong: #c6cfdb;
      --text: #17212f;
      --muted: #5f6b7c;
      --accent: #1f5fbf;
      --accent-soft: #eaf1fb;
      --add: #edf7f1;
      --add-border: #83b996;
      --remove: #fbefef;
      --remove-border: #d09090;
      --same: #f8fafc;
      --shadow: 0 18px 50px rgba(23, 33, 47, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background:
        linear-gradient(180deg, #f7f9fc 0%, var(--bg) 100%);
      color: var(--text);
    }

    .page {
      width: min(1960px, calc(100vw - 12px));
      min-height: calc(100vh - 12px);
      margin: 6px auto;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 10px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .hero {
      padding: clamp(18px, 2vw, 26px);
      background: linear-gradient(180deg, #ffffff, #f7f9fc);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.7rem, 2.9vw, 3rem);
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: none;
      white-space: nowrap;
    }

    .editors {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 14px 14px;
    }

    .editor-panel {
      padding: 16px;
      background: linear-gradient(180deg, #ffffff, #fbfcfe);
      border-radius: 14px;
      border: 1px solid #e5e9f0;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
    }

    .panel-title {
      display: block;
    }

    .meta {
      color: var(--muted);
      font-size: 0.88rem;
    }

    .editor-shell {
      display: grid;
      grid-template-columns: minmax(70px, auto) minmax(0, 1fr);
      width: 100%;
      min-height: clamp(220px, 30vh, 460px);
      height: clamp(280px, 34vh, 520px);
      resize: vertical;
      overflow: hidden;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #ffffff;
    }

    .editor-shell:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(31, 95, 191, 0.12);
    }

    .line-numbers {
      min-width: 70px;
      padding: 16px 12px;
      border-right: 1px solid #edf1f7;
      background: #fafbfd;
      color: var(--muted);
      font: 14px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-align: right;
      user-select: none;
      white-space: nowrap;
    }

    .line-number-row {
      min-height: 1.5em;
      line-height: 1.5;
    }

    textarea {
      width: 100%;
      min-height: 0;
      height: 100%;
      resize: none;
      border: none;
      border-radius: 0;
      padding: 16px;
      font: 14px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      color: var(--text);
      background: #ffffff;
      outline: none;
      overflow: auto;
      white-space: pre;
    }

    textarea.wrap-lines {
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .input-options {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 4px 10px 2px;
    }

    .input-wrap-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-height: 36px;
      padding: 6px 12px 6px 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .input-wrap-toggle input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .input-wrap-switch {
      position: relative;
      width: 36px;
      height: 20px;
      border-radius: 999px;
      background: #d7dde6;
      transition: background-color 140ms ease;
      flex: 0 0 auto;
    }

    .input-wrap-switch::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 2px rgba(23, 33, 47, 0.22);
      transition: transform 140ms ease;
    }

    .input-wrap-toggle input:checked + .input-wrap-switch {
      background: var(--accent);
    }

    .input-wrap-toggle input:checked + .input-wrap-switch::after {
      transform: translateX(16px);
    }

    .input-wrap-toggle:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.12);
    }

    .line-measure {
      position: absolute;
      top: -10000px;
      left: -10000px;
      visibility: hidden;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      word-break: normal;
    }

    .results {
      padding: 16px;
      display: grid;
      min-height: 0;
    }

    .results-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .results-top h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .stats {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.9rem;
      align-items: center;
    }

    .pill {
      padding: 0;
      border: none;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
      font-variant-numeric: tabular-nums;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .view-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #f7f9fc;
    }

    .view-toggle legend {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .view-option {
      position: relative;
    }

    .view-option input {
      position: absolute;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .view-option label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 8px 14px;
      border-radius: 9px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: background-color 140ms ease, color 140ms ease, box-shadow 140ms ease;
    }

    .view-option input:focus-visible + label {
      outline: 2px solid rgba(31, 95, 191, 0.22);
      outline-offset: 1px;
    }

    .view-option input:checked + label {
      background: #ffffff;
      color: var(--text);
      box-shadow: 0 1px 2px rgba(23, 33, 47, 0.08);
    }

    .control-group {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .action-button {
      min-height: 38px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color 140ms ease, box-shadow 140ms ease, color 140ms ease;
    }

    .action-button:hover:not(:disabled),
    .action-button:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.12);
      outline: none;
    }

    .action-button:disabled {
      color: #99a4b7;
      cursor: not-allowed;
      background: #f8fafc;
    }

    .filter-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #ffffff;
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
    }

    .filter-toggle input {
      width: 15px;
      height: 15px;
      margin: 0;
      accent-color: var(--accent);
    }

    .stat-button {
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-variant-numeric: tabular-nums;
      cursor: pointer;
    }

    .stat-button:hover:not(:disabled),
    .stat-button:focus-visible {
      color: var(--accent);
      outline: none;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .stat-button:disabled {
      color: #99a4b7;
      cursor: not-allowed;
      text-decoration: none;
    }

    #expandDiffButton {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    #expandDiffButton:hover,
    #expandDiffButton:focus-visible,
    #expandDiffButton.is-active {
      border-color: var(--accent);
      background: #dceafa;
      color: var(--accent);
      box-shadow: 0 0 0 3px rgba(31, 95, 191, 0.12);
    }

    body.diff-expanded {
      overflow: hidden;
    }

    .results.is-expanded {
      position: fixed;
      inset: 10px;
      z-index: 10;
      grid-template-rows: auto minmax(0, 1fr);
      margin: 0;
      padding: 16px;
    }

    .results.is-expanded .diff-output {
      height: 100%;
      max-height: none;
    }

    .diff-output {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      max-height: clamp(320px, 54vh, 1200px);
      overflow: auto;
      min-height: 0;
    }

    .diff-header,
    .diff-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .diff-output.single-column .diff-header,
    .diff-output.single-column .diff-row {
      grid-template-columns: minmax(0, 1fr);
    }

    .diff-header {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      border-bottom: 1px solid #e7ebf2;
      font-weight: 600;
      color: var(--muted);
    }

    .diff-header > div {
      padding: 12px 16px;
    }

    .diff-header > div:first-child {
      border-right: 1px solid #e7ebf2;
    }

    .empty-state {
      padding: 24px;
      color: var(--muted);
      line-height: 1.6;
    }

    .diff-row {
      border-top: 1px solid #edf1f7;
    }

    .diff-row:first-of-type {
      border-top: none;
    }

    .diff-cell {
      display: grid;
      grid-template-columns: 76px 34px minmax(0, 1fr);
      font: 14px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      min-height: 0;
    }

    .diff-cell.left {
      border-right: 1px solid #edf1f7;
    }

    .cell-line,
    .cell-marker,
    .cell-content {
      padding: 2px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .cell-line {
      text-align: right;
      color: var(--muted);
      background: #fafbfd;
      border-right: 1px solid #edf1f7;
      white-space: nowrap;
    }

    .cell-marker {
      text-align: center;
      font-weight: 700;
      border-right: 1px solid #edf1f7;
    }

    .cell-content {
      padding-left: 14px;
    }

    .empty-cell .cell-content {
      color: #99a4b7;
      background: #fcfdff;
    }

    .same .cell-content {
      background: var(--same);
    }

    .add .cell-content,
    .add .cell-marker {
      background: var(--add);
    }

    .remove .cell-content,
    .remove .cell-marker {
      background: var(--remove);
    }

    .change-left .cell-content,
    .change-left .cell-marker {
      background: #fcf1f1;
      border-left: 3px solid var(--remove-border);
    }

    .change-right .cell-content,
    .change-right .cell-marker {
      background: #eff8f2;
      border-left: 3px solid var(--add-border);
    }

    .token-remove {
      background: rgba(208, 144, 144, 0.26);
      border-radius: 3px;
    }

    .token-add {
      background: rgba(131, 185, 150, 0.28);
      border-radius: 3px;
    }

    .unified-entry {
      border-top: 1px solid #edf1f7;
      padding: 0;
    }

    .unified-entry:first-of-type {
      border-top: none;
    }

    .unified-block {
      display: grid;
      grid-template-columns: 88px 42px minmax(0, 1fr);
      font: 14px/1.5 "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .unified-block + .unified-block {
      border-top: 1px solid #eef2f6;
    }

    .unified-line,
    .unified-marker,
    .unified-content {
      padding: 2px 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .unified-line {
      text-align: right;
      color: var(--muted);
      background: #fafbfd;
      border-right: 1px solid #edf1f7;
      white-space: nowrap;
    }

    .unified-marker {
      text-align: center;
      font-weight: 700;
      border-right: 1px solid #edf1f7;
    }

    .unified-content.same {
      background: var(--same);
    }

    .unified-content.remove {
      background: var(--remove);
      border-left: 3px solid var(--remove-border);
    }

    .unified-content.add {
      background: var(--add);
      border-left: 3px solid var(--add-border);
    }

    @media (max-width: 900px) {
      .page {
        width: min(100vw, calc(100vw - 8px));
        margin: 4px auto;
        gap: 8px;
      }

      .editors {
        grid-template-columns: 1fr;
        gap: 10px;
        padding: 0 10px 10px;
      }

      .diff-header,
      .diff-row {
        grid-template-columns: 1fr;
      }

      .diff-output.single-column .diff-header {
        grid-template-columns: 1fr;
      }

      .diff-header > div:first-child,
      .diff-cell.left {
        border-right: none;
        border-bottom: 1px solid #edf1f7;
      }

      .diff-cell {
        grid-template-columns: 70px 32px minmax(0, 1fr);
      }

      .results,
      .editor-panel {
        padding: 12px;
      }

      .view-option label {
        min-width: 96px;
      }

      .toolbar {
        width: 100%;
        justify-content: space-between;
      }
    }

    @media (min-width: 1500px) {
      .editors {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .editor-shell {
        height: clamp(320px, 36vh, 620px);
      }

      .diff-output {
        max-height: clamp(420px, 58vh, 1400px);
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card hero">
      <h1>Text Diff Viewer</h1>
      <p class="subtitle">
        Paste or type two blocks of text below. When both sides have content, the page shows a line-by-line diff at the bottom.
      </p>
    </section>

    <section class="card editors">
      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>Left Text</h2>
          </div>
          <span class="meta" id="leftMeta">0 lines</span>
        </div>
        <div class="editor-shell">
          <div class="line-numbers" id="leftLineNumbers" aria-hidden="true">1</div>
          <textarea class="wrap-lines" id="leftText" placeholder="Paste the original text here..." aria-label="Left text input" wrap="soft" spellcheck="false"></textarea>
        </div>
      </div>

      <div class="editor-panel">
        <div class="panel-header">
          <div class="panel-title">
            <h2>Right Text</h2>
          </div>
          <span class="meta" id="rightMeta">0 lines</span>
        </div>
        <div class="editor-shell">
          <div class="line-numbers" id="rightLineNumbers" aria-hidden="true">1</div>
          <textarea class="wrap-lines" id="rightText" placeholder="Paste the updated text here..." aria-label="Right text input" wrap="soft" spellcheck="false"></textarea>
        </div>
      </div>
      <div class="input-options">
        <label class="input-wrap-toggle">
          <input type="checkbox" id="inputWrapToggle" checked>
          <span class="input-wrap-switch" aria-hidden="true"></span>
          <span>Wrap Input</span>
        </label>
      </div>
    </section>

    <section class="card results" id="resultsPanel">
      <div class="results-top">
        <h2>Differences</h2>
        <div class="toolbar">
          <fieldset class="view-toggle">
            <legend>Compare View</legend>
            <div class="view-option">
              <input type="radio" id="viewTwoColumn" name="viewMode" value="two-column" checked>
              <label for="viewTwoColumn">Two Columns</label>
            </div>
            <div class="view-option">
              <input type="radio" id="viewSingleColumn" name="viewMode" value="single-column">
              <label for="viewSingleColumn">Single Column</label>
            </div>
          </fieldset>
          <div class="control-group" aria-label="Difference navigation">
            <button class="action-button" type="button" id="previousDiffButton" disabled>Previous Diff</button>
            <button class="action-button" type="button" id="nextDiffButton" disabled>Next Diff</button>
            <label class="filter-toggle">
              <input type="checkbox" id="hideUnchangedToggle">
              Hide Unchanged
            </label>
          </div>
          <div class="control-group" aria-label="Difference actions">
            <button class="action-button" type="button" id="downloadDiffButton" disabled>Download Diff</button>
            <button class="action-button" type="button" id="expandDiffButton" aria-pressed="false" title="Expand differences">Expand</button>
          </div>
          <div class="stats">
            <span class="pill" id="sameCount">Unchanged: 0</span>
            <button class="stat-button" type="button" id="changeCount" data-jump-kind="change" disabled>Changed: 0</button>
            <button class="stat-button" type="button" id="addCount" data-jump-kind="add" disabled>Added: 0</button>
            <button class="stat-button" type="button" id="removeCount" data-jump-kind="remove" disabled>Removed: 0</button>
          </div>
        </div>
      </div>
      <div class="diff-output" id="diffOutput">
        <div class="empty-state">
          Fill both text fields to see the diff.
        </div>
      </div>
    </section>
  </main>

  <script>
    const leftText = document.getElementById("leftText");
    const rightText = document.getElementById("rightText");
    const inputWrapToggle = document.getElementById("inputWrapToggle");
    const leftMeta = document.getElementById("leftMeta");
    const rightMeta = document.getElementById("rightMeta");
    const leftLineNumbers = document.getElementById("leftLineNumbers");
    const rightLineNumbers = document.getElementById("rightLineNumbers");
    const resultsPanel = document.getElementById("resultsPanel");
    const diffOutput = document.getElementById("diffOutput");
    const downloadDiffButton = document.getElementById("downloadDiffButton");
    const previousDiffButton = document.getElementById("previousDiffButton");
    const nextDiffButton = document.getElementById("nextDiffButton");
    const hideUnchangedToggle = document.getElementById("hideUnchangedToggle");
    const expandDiffButton = document.getElementById("expandDiffButton");
    const sameCount = document.getElementById("sameCount");
    const changeCount = document.getElementById("changeCount");
    const addCount = document.getElementById("addCount");
    const removeCount = document.getElementById("removeCount");
    const viewModeInputs = document.querySelectorAll('input[name="viewMode"]');
    const jumpButtons = document.querySelectorAll("[data-jump-kind]");
    let currentRows = [];
    let lastJumpIndex = -1;
    let measureElement;

    function splitLines(text) {
      return text.replace(/\r\n/g, "\n").split("\n");
    }

    function getMeasureElement() {
      if (!measureElement) {
        measureElement = document.createElement("div");
        measureElement.className = "line-measure";
        document.body.appendChild(measureElement);
      }

      return measureElement;
    }

    function getLineHeight(textarea) {
      const styles = window.getComputedStyle(textarea);
      const parsed = Number.parseFloat(styles.lineHeight);
      return Number.isFinite(parsed) ? parsed : 21;
    }

    function getWrappedLineHeight(textarea, line) {
      const styles = window.getComputedStyle(textarea);
      const measure = getMeasureElement();
      const contentWidth = textarea.clientWidth
        - Number.parseFloat(styles.paddingLeft)
        - Number.parseFloat(styles.paddingRight);
      measure.style.width = `${Math.max(contentWidth, 0)}px`;
      measure.style.font = styles.font;
      measure.style.lineHeight = styles.lineHeight;
      measure.style.letterSpacing = styles.letterSpacing;
      measure.textContent = line || " ";
      return Math.max(measure.scrollHeight, getLineHeight(textarea));
    }

    function buildLineNumberMarkup(textarea) {
      const lines = splitLines(textarea.value);
      const isWrapped = inputWrapToggle.checked;

      return lines.map((line, index) => {
        const height = isWrapped ? ` style="height: ${getWrappedLineHeight(textarea, line)}px"` : "";
        return `<div class="line-number-row"${height}>${index + 1}</div>`;
      }).join("");
    }

    function syncLineNumbers(textarea, lineNumbers) {
      lineNumbers.scrollTop = textarea.scrollTop;
    }

    function updateEditorLineNumbers(textarea, lineNumbers) {
      lineNumbers.innerHTML = buildLineNumberMarkup(textarea);
      syncLineNumbers(textarea, lineNumbers);
    }

    function setInputWrap(enabled) {
      [leftText, rightText].forEach((textarea) => {
        textarea.classList.toggle("wrap-lines", enabled);
        textarea.setAttribute("wrap", enabled ? "soft" : "off");
      });
      updateMeta();
    }

    function updateMeta() {
      leftMeta.textContent = `${splitLines(leftText.value).length} lines`;
      rightMeta.textContent = `${splitLines(rightText.value).length} lines`;
      updateEditorLineNumbers(leftText, leftLineNumbers);
      updateEditorLineNumbers(rightText, rightLineNumbers);
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function tokenize(value) {
      return value.match(/(\s+|[A-Za-z0-9_]+|[^A-Za-z0-9_\s])/g) || [];
    }

    function buildDiff(a, b) {
      const n = a.length;
      const m = b.length;
      const max = n + m;
      const offset = max;
      const v = new Array((max * 2) + 1).fill(0);
      const trace = [];

      for (let d = 0; d <= max; d += 1) {
        trace.push(v.slice());

        for (let k = -d; k <= d; k += 2) {
          const index = k + offset;
          let x;

          if (k === -d || (k !== d && v[index - 1] < v[index + 1])) {
            x = v[index + 1];
          } else {
            x = v[index - 1] + 1;
          }

          let y = x - k;

          while (x < n && y < m && a[x] === b[y]) {
            x += 1;
            y += 1;
          }

          v[index] = x;

          if (x >= n && y >= m) {
            trace.push(v.slice());
            return backtrack(trace, a, b, offset);
          }
        }
      }

      return [];
    }

    function backtrack(trace, a, b, offset) {
      const result = [];
      let x = a.length;
      let y = b.length;

      for (let d = trace.length - 1; d > 0; d -= 1) {
        const v = trace[d - 1];
        const k = x - y;
        const prevK = (k === -(d - 1) || (k !== (d - 1) && v[k - 1 + offset] < v[k + 1 + offset]))
          ? k + 1
          : k - 1;

        const prevX = v[prevK + offset];
        const prevY = prevX - prevK;

        while (x > prevX && y > prevY) {
          result.push({ type: "same", text: a[x - 1] });
          x -= 1;
          y -= 1;
        }

        if (d === 1) {
          break;
        }

        if (x === prevX) {
          result.push({ type: "add", text: b[y - 1] });
          y -= 1;
        } else {
          result.push({ type: "remove", text: a[x - 1] });
          x -= 1;
        }
      }

      while (x > 0 && y > 0) {
        result.push({ type: "same", text: a[x - 1] });
        x -= 1;
        y -= 1;
      }

      while (x > 0) {
        result.push({ type: "remove", text: a[x - 1] });
        x -= 1;
      }

      while (y > 0) {
        result.push({ type: "add", text: b[y - 1] });
        y -= 1;
      }

      return result.reverse();
    }

    function buildPairedRows(diff) {
      const rows = [];
      let leftLine = 1;
      let rightLine = 1;

      for (let i = 0; i < diff.length; i += 1) {
        const entry = diff[i];

        if (entry.type === "same") {
          rows.push({
            kind: "same",
            left: { line: leftLine, text: entry.text, marker: " " },
            right: { line: rightLine, text: entry.text, marker: " " }
          });
          leftLine += 1;
          rightLine += 1;
          continue;
        }

        if (entry.type === "remove" || entry.type === "add") {
          const removed = [];
          const added = [];

          while (i < diff.length && diff[i].type !== "same") {
            if (diff[i].type === "remove") {
              removed.push(diff[i].text);
            } else {
              added.push(diff[i].text);
            }
            i += 1;
          }

          i -= 1;
          const blockSize = Math.max(removed.length, added.length);

          for (let index = 0; index < blockSize; index += 1) {
            const leftValue = removed[index];
            const rightValue = added[index];

            if (leftValue !== undefined && rightValue !== undefined) {
              rows.push({
                kind: "change",
                left: { line: leftLine, text: leftValue, marker: "~" },
                right: { line: rightLine, text: rightValue, marker: "~" }
              });
              leftLine += 1;
              rightLine += 1;
            } else if (leftValue !== undefined) {
              rows.push({
                kind: "remove",
                left: { line: leftLine, text: leftValue, marker: "-" },
                right: { line: "", text: "", marker: " " }
              });
              leftLine += 1;
            } else {
              rows.push({
                kind: "add",
                left: { line: "", text: "", marker: " " },
                right: { line: rightLine, text: rightValue, marker: "+" }
              });
              rightLine += 1;
            }
          }
        }
      }

      return rows;
    }

    function buildInlineDiff(leftTextValue, rightTextValue) {
      const tokenDiff = buildDiff(tokenize(leftTextValue), tokenize(rightTextValue));
      let leftMarkup = "";
      let rightMarkup = "";

      for (const entry of tokenDiff) {
        const escaped = escapeHtml(entry.text) || "&nbsp;";

        if (entry.type === "same") {
          leftMarkup += escaped;
          rightMarkup += escaped;
        } else if (entry.type === "remove") {
          leftMarkup += `<span class="token-remove">${escaped}</span>`;
        } else if (entry.type === "add") {
          rightMarkup += `<span class="token-add">${escaped}</span>`;
        }
      }

      return {
        left: leftMarkup || "&nbsp;",
        right: rightMarkup || "&nbsp;"
      };
    }

    function buildCell(side, variant, inlineMarkup) {
      const text = side.text;
      const safeText = text ? escapeHtml(text) : "&nbsp;";
      let content = safeText;

      if (inlineMarkup) {
        content = inlineMarkup;
      }

      return `
        <div class="diff-cell ${variant} ${text ? "" : "empty-cell"}">
          <span class="cell-line">${side.line}</span>
          <span class="cell-marker">${side.marker}</span>
          <span class="cell-content">${content || "&nbsp;"}</span>
        </div>
      `;
    }

    function getViewMode() {
      const selected = Array.from(viewModeInputs).find((input) => input.checked);
      return selected ? selected.value : "two-column";
    }

    function buildUnifiedBlock(lineNumber, marker, content, variant) {
      return `
        <div class="unified-block">
          <span class="unified-line">${lineNumber}</span>
          <span class="unified-marker">${marker}</span>
          <span class="unified-content ${variant}">${content}</span>
        </div>
      `;
    }

    function renderTwoColumn(rows) {
      return rows.map((row) => {
        if (row.kind === "same") {
          return `
            <div class="diff-row" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildCell(row.left, "same")}
              ${buildCell(row.right, "same")}
            </div>
          `;
        }

        if (row.kind === "change") {
          const inlineDiff = buildInlineDiff(row.left.text, row.right.text);
          return `
            <div class="diff-row" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildCell(row.left, "change-left", inlineDiff.left)}
              ${buildCell(row.right, "change-right", inlineDiff.right)}
            </div>
          `;
        }

        if (row.kind === "remove") {
          return `
            <div class="diff-row" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildCell(row.left, "remove")}
              ${buildCell(row.right, "same")}
            </div>
          `;
        }

        return `
          <div class="diff-row" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
            ${buildCell(row.left, "same")}
            ${buildCell(row.right, "add")}
          </div>
        `;
      }).join("");
    }

    function renderSingleColumn(rows) {
      return rows.map((row) => {
        if (row.kind === "same") {
          return `
            <div class="unified-entry" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildUnifiedBlock(`${row.left.line}/${row.right.line}`, " ", escapeHtml(row.left.text) || "&nbsp;", "same")}
            </div>
          `;
        }

        if (row.kind === "change") {
          const inlineDiff = buildInlineDiff(row.left.text, row.right.text);
          return `
            <div class="unified-entry" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildUnifiedBlock(row.left.line, "-", inlineDiff.left, "remove")}
              ${buildUnifiedBlock(row.right.line, "+", inlineDiff.right, "add")}
            </div>
          `;
        }

        if (row.kind === "remove") {
          return `
            <div class="unified-entry" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
              ${buildUnifiedBlock(row.left.line, "-", escapeHtml(row.left.text) || "&nbsp;", "remove")}
            </div>
          `;
        }

        return `
          <div class="unified-entry" data-diff-kind="${row.kind}" data-diff-index="${row.index}">
            ${buildUnifiedBlock(row.right.line, "+", escapeHtml(row.right.text) || "&nbsp;", "add")}
          </div>
        `;
      }).join("");
    }

    function getDiffRows() {
      const leftValue = leftText.value;
      const rightValue = rightText.value;

      if (!leftValue.trim() || !rightValue.trim()) {
        return [];
      }

      return buildPairedRows(buildDiff(splitLines(leftValue), splitLines(rightValue)));
    }

    function renderDiff() {
      updateMeta();

      currentRows = getDiffRows().map((row, index) => ({ ...row, index }));
      lastJumpIndex = -1;

      if (!currentRows.length) {
        diffOutput.innerHTML = '<div class="empty-state">Fill both text fields to see the diff.</div>';
        downloadDiffButton.disabled = true;
        previousDiffButton.disabled = true;
        nextDiffButton.disabled = true;
        sameCount.textContent = "Unchanged: 0";
        changeCount.textContent = "Changed: 0";
        addCount.textContent = "Added: 0";
        removeCount.textContent = "Removed: 0";
        changeCount.disabled = true;
        addCount.disabled = true;
        removeCount.disabled = true;
        return;
      }

      downloadDiffButton.disabled = false;
      let same = 0;
      let changed = 0;
      let added = 0;
      let removed = 0;

      currentRows.forEach((row) => {
        if (row.kind === "same") {
          same += 1;
        } else if (row.kind === "change") {
          changed += 1;
        } else if (row.kind === "remove") {
          removed += 1;
        } else {
          added += 1;
        }
      });

      const visibleRows = hideUnchangedToggle.checked
        ? currentRows.filter((row) => row.kind !== "same")
        : currentRows;
      const hasDiffs = changed + added + removed > 0;
      previousDiffButton.disabled = !hasDiffs;
      nextDiffButton.disabled = !hasDiffs;
      changeCount.disabled = changed === 0;
      addCount.disabled = added === 0;
      removeCount.disabled = removed === 0;

      const viewMode = getViewMode();
      const markup = visibleRows.length
        ? (viewMode === "single-column" ? renderSingleColumn(visibleRows) : renderTwoColumn(visibleRows))
        : '<div class="empty-state">No differences to show.</div>';

      diffOutput.className = `diff-output ${viewMode}`;
      diffOutput.innerHTML = viewMode === "single-column"
        ? `
          <div class="diff-header">
            <div>Unified Diff</div>
          </div>
          ${markup}
        `
        : `
          <div class="diff-header">
            <div>Left / Original</div>
            <div>Right / Updated</div>
          </div>
          ${markup}
        `;
      sameCount.textContent = `Unchanged: ${same}`;
      changeCount.textContent = `Changed: ${changed}`;
      addCount.textContent = `Added: ${added}`;
      removeCount.textContent = `Removed: ${removed}`;
    }

    function formatDiffForDownload(rows) {
      const lines = ["--- Left Text", "+++ Right Text", "@@"];

      rows.forEach((row) => {
        if (row.kind === "same") {
          lines.push(`  ${row.left.text}`);
        } else if (row.kind === "change") {
          lines.push(`- ${row.left.text}`);
          lines.push(`+ ${row.right.text}`);
        } else if (row.kind === "remove") {
          lines.push(`- ${row.left.text}`);
        } else {
          lines.push(`+ ${row.right.text}`);
        }
      });

      return `${lines.join("\n")}\n`;
    }

    function downloadDiff() {
      const rows = currentRows.length ? currentRows : getDiffRows();

      if (!rows.length) {
        return;
      }

      const timestamp = new Date().toISOString().replace(/[:.]/g, "-");
      const blob = new Blob([formatDiffForDownload(rows)], { type: "text/plain" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `text-diff-${timestamp}.diff`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    }

    function getDiffIndexes(kind = "diff") {
      return currentRows
        .filter((row) => row.kind !== "same" && (kind === "diff" || row.kind === kind))
        .map((row) => row.index);
    }

    function jumpToDiff(kind = "diff", direction = 1) {
      const indexes = getDiffIndexes(kind);

      if (!indexes.length) {
        return;
      }

      let targetIndex;

      if (direction > 0) {
        targetIndex = indexes.find((index) => index > lastJumpIndex) ?? indexes[0];
      } else {
        targetIndex = [...indexes].reverse().find((index) => index < lastJumpIndex) ?? indexes[indexes.length - 1];
      }

      lastJumpIndex = targetIndex;
      const target = diffOutput.querySelector(`[data-diff-index="${targetIndex}"]`);

      if (target) {
        target.scrollIntoView({ behavior: "smooth", block: "center" });
      }
    }

    function setExpandedDiff(isExpanded) {
      resultsPanel.classList.toggle("is-expanded", isExpanded);
      document.body.classList.toggle("diff-expanded", isExpanded);
      expandDiffButton.textContent = isExpanded ? "Shrink" : "Expand";
      expandDiffButton.classList.toggle("is-active", isExpanded);
      expandDiffButton.setAttribute("aria-pressed", String(isExpanded));
      expandDiffButton.title = isExpanded ? "Shrink differences (Esc)" : "Expand differences";
    }

    function toggleExpandedDiff() {
      setExpandedDiff(!resultsPanel.classList.contains("is-expanded"));
    }

    function handleDocumentKeydown(event) {
      if (event.key === "Escape" && resultsPanel.classList.contains("is-expanded")) {
        setExpandedDiff(false);
      }
    }

    leftText.addEventListener("input", renderDiff);
    rightText.addEventListener("input", renderDiff);
    inputWrapToggle.addEventListener("change", () => setInputWrap(inputWrapToggle.checked));
    window.addEventListener("resize", updateMeta);
    downloadDiffButton.addEventListener("click", downloadDiff);
    previousDiffButton.addEventListener("click", () => jumpToDiff("diff", -1));
    nextDiffButton.addEventListener("click", () => jumpToDiff("diff", 1));
    hideUnchangedToggle.addEventListener("change", renderDiff);
    jumpButtons.forEach((button) => {
      button.addEventListener("click", () => jumpToDiff(button.dataset.jumpKind, 1));
    });
    expandDiffButton.addEventListener("click", toggleExpandedDiff);
    document.addEventListener("keydown", handleDocumentKeydown);
    leftText.addEventListener("scroll", () => syncLineNumbers(leftText, leftLineNumbers));
    rightText.addEventListener("scroll", () => syncLineNumbers(rightText, rightLineNumbers));
    viewModeInputs.forEach((input) => input.addEventListener("change", renderDiff));

    setInputWrap(inputWrapToggle.checked);
    renderDiff();
  </script>
</body>
</html>
